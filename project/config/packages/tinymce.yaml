tinymce:
    skin: oxide
    content_css: default
    content_style: "body { background:#ffffff; color:#1f3b3a; font-family:'Fira Sans', sans-serif; font-size:14px; line-height:1.55; } p { margin: 0 0 .75rem; }"
    plugins: "autolink lists"
    toolbar: "undo redo | blocks | bold italic underline | bullist numlist | removeformat"
    menubar: ""
    contextmenu: ""
    quickbars_insert_toolbar: ""
    quickbars_selection_toolbar: ""
    resize: "vertical"
