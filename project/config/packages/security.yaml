security:
    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    password_hashers:
        App\Entity\User: 'auto'

    # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            # Ensure dev tools and static assets are always allowed
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        main:
            stateless: true
            lazy: true
            provider: app_user_provider
            user_checker: App\Security\AccountStatusUserChecker
            entry_point: App\Security\ApiAwareEntryPoint
            custom_authenticators:
                - App\Security\Jwt\JwtAuthenticator

            # Activate different ways to authenticate:
            # https://symfony.com/doc/current/security.html#the-firewall

            # https://symfony.com/doc/current/security/impersonating_user.html
            # switch_user: true

    # Note: Only the *first* matching rule is applied
    access_control:
        - { path: ^/api/auth/2fa/check$, roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/2fa/(enable|verify|disable)$, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/api/auth/(login|register|logout|refresh|forgot-password|verify-reset-code|reset-password|reset/send|reset/confirm|verify-email|verify-email/resend|face/login|google/connect|google/callback)$, roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/face/(enable|disable|enroll)$, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/api/auth/me$, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/api/avatar/generate$, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/(sommeil|reve), roles: [ROLE_PATIENT, ROLE_THERAPIST] }
        - { path: ^/user, roles: [ROLE_PATIENT, ROLE_THERAPIST] }
        - { path: ^/forum, roles: [ROLE_PATIENT, ROLE_THERAPIST] }
        - { path: ^/threads, roles: [ROLE_PATIENT, ROLE_THERAPIST] }
        - { path: ^/notifications, roles: [ROLE_PATIENT, ROLE_THERAPIST] }
        - { path: ^/api/user, roles: [ROLE_PATIENT, ROLE_THERAPIST] }
        - { path: ^/admin/dashboard$, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/admin, roles: ROLE_ADMIN }
        - { path: ^/api/admin, roles: ROLE_ADMIN }
        - { path: ^/api, roles: PUBLIC_ACCESS }

when@test:
    security:
        password_hashers:
            # Password hashers are resource-intensive by design to ensure security.
            # In tests, it's safe to reduce their cost to improve performance.
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4 # Lowest possible value for bcrypt
                time_cost: 3 # Lowest possible value for argon
                memory_cost: 10 # Lowest possible value for argon
